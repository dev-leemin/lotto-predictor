services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lotto
      POSTGRES_USER: lotto_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotto_user -d lotto"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://lotto_user:${POSTGRES_PASSWORD:-changeme}@db:5432/lotto
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - web

volumes:
  postgres_data:

networks:
  web:
    external: true
